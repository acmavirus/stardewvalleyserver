services:
  # Main game server
  server:
    image: sdvd/server:${IMAGE_VERSION:-latest}
    container_name: sdvd-server
    stdin_open: true
    tty: true
    ports:
      - "${VNC_PORT:-5800}:5800"
      - "${API_PORT:-8080}:8080"
      - "${GAME_PORT:-24642}:24642/udp"
      - "${QUERY_PORT:-27015}:27015/udp"
    cap_add:
      - SYS_TIME
    volumes:
      - game-data:/data/game
      - saves:/config/xdg/config/StardewValley
      - ./settings:/data/settings
    environment:
      STEAM_AUTH_URL: "http://steam-auth:3001"
      STEAM_USER: "${STEAM_USER}"
      STEAM_PASS: "${STEAM_PASS}"
      STEAM_GUARD_CODE: "${STEAM_GUARD_CODE}"
      VNC_PASSWORD: "${VNC_PASSWORD:-}"
      DISABLE_RENDERING: "${DISABLE_RENDERING:-true}"
      SETTINGS_PATH: "/data/settings/server-settings.json"
      API_ENABLED: "${API_ENABLED:-true}"
      API_PORT: "${API_PORT:-8080}"
      API_KEY: "${API_KEY:-}"
      SERVER_PASSWORD: "${SERVER_PASSWORD:-}"
      MAX_LOGIN_ATTEMPTS: "${MAX_LOGIN_ATTEMPTS:-3}"
      AUTH_TIMEOUT_SECONDS: "${AUTH_TIMEOUT_SECONDS:-120}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
    depends_on:
      steam-auth:
        condition: service_healthy
    restart: unless-stopped

  steam-auth:
    image: sdvd/steam-service:${IMAGE_VERSION:-latest}
    container_name: sdvd-steam-auth
    stdin_open: true
    tty: true
    expose:
      - "3001"
    volumes:
      - steam-session:/data/steam-session
      - game-data:/data/game
    environment:
      PORT: "3001"
      GAME_DIR: "/data/game"
      SESSION_DIR: "/data/steam-session"
      STEAM_USERNAME: "${STEAM_USER}"
      STEAM_PASSWORD: "${STEAM_PASS}"
    restart: unless-stopped

volumes:
  steam-session:
  game-data:
  saves:
  settings:
